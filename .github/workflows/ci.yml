name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  db-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Type-check DB safety boundaries
        run: |
          python -m mypy --follow-imports=skip \
            daita/db/models.py \
            daita/db/planner_protocol.py \
            daita/db/runtime/tasks/context.py \
            daita/db/runtime/tasks/models.py \
            daita/db/runtime/tasks/execution.py \
            daita/runtime/primitives.py \
            daita/db/runtime/tasks/common.py \
            daita/db/runtime/tasks/dependencies.py \
            daita/db/runtime/tasks/planning.py \
            daita/db/runtime/tasks/readiness.py \
            daita/db/runtime/tasks/inputs.py \
            daita/db/runtime/tasks/catalog.py \
            daita/db/runtime/tasks/evidence.py \
            daita/db/runtime/tasks/synthesis.py \
            daita/db/runtime/tasks/runtime.py \
            daita/db/runtime/facade.py \
            daita/db/context_projection.py \
            daita/db/runtime/results.py \
            daita/db/runtime/governance.py \
            daita/db/runtime/resume.py \
            daita/db/loop/compiler.py \
            daita/db/loop/runner.py \
            daita/db/analysis.py \
            daita/db/monitors.py \
            daita/db/runtime/monitors.py

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pip install -e ".[all,dev,aws,azure,data-quality,google-drive,sentence-transformers,voyage]"

      - name: Type-check with Pyright
        run: npx --yes pyright@1.1.411 daita

  optional-plugin-types:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - family: relational-stateful
            extras: dev,sqlite,postgresql,mysql,mongodb,redis
            paths: daita/plugins/sqlite.py daita/plugins/sqlite_extensions.py daita/plugins/postgresql.py daita/plugins/postgresql_extensions.py daita/plugins/mysql.py daita/plugins/mysql_extensions.py daita/plugins/mongodb.py daita/plugins/mongodb_extensions.py daita/plugins/redis.py daita/plugins/redis_extensions.py
          - family: search-vector
            extras: dev,elasticsearch,qdrant,pinecone,chromadb
            paths: daita/plugins/elasticsearch.py daita/plugins/elasticsearch_extensions.py daita/plugins/qdrant.py daita/plugins/qdrant_extensions.py daita/plugins/pinecone.py daita/plugins/pinecone_extensions.py daita/plugins/chroma.py daita/plugins/chroma_extensions.py
          - family: cloud-communication
            extras: dev,aws,google-drive,slack
            paths: daita/plugins/s3.py daita/plugins/s3_extensions.py daita/plugins/email.py daita/plugins/google_drive.py daita/plugins/google_drive_extensions.py daita/plugins/slack.py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install optional plugin dependencies
        run: pip install -e ".[${{ matrix.extras }}]"

      - name: Type-check optional plugins with Pyright
        run: npx --yes pyright@1.1.411 ${{ matrix.paths }}

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -m "not requires_llm and not requires_db"
